<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

/* HEADER */
.header{
background: linear-gradient(90deg, #5e2be1, #9b64f0);
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* SUCCESS ICON */
.success{
text-align:center;
font-size:60px;
color:#28a745;
}

/* TITLE */
h2{
text-align:center;
}

/* DETAILS */
.detail{
margin:12px 0;
font-size:16px;
}

/* ITEMS */
.item{
display:flex;
justify-content:space-between;
padding:12px;
margin-top:8px;
background:#f9f9f9;
border-radius:10px;
}

/* TOTAL */
.total{
font-weight:bold;
font-size:20px;
margin-top:20px;
text-align:right;
}

/* BUTTONS */
.btn{
display:block;
width:100%;
text-align:center;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
text-decoration:none;
cursor:pointer;
}

/* PRIMARY BUTTON */
.primary{
background:linear-gradient(90deg,#5e2be1,#9b64f0);
color:white;
}

/* WHATSAPP BUTTON */
.whatsapp{
background:#25D366;
color:white;
}

/* DOWNLOAD BUTTON */
.download{
background:#333;
color:white;
}

/* MOBILE */
@media(max-width:600px){
.container{
margin:20px;
padding:20px;
}
}
</style>
</head>

<body>

<div class="header">Payment Successful 🎉</div>

<div class="container" id="receiptBox">

<div class="success">✅</div>

<h2>Thank you for your purchase</h2>

<div id="receiptDetails"></div>

<!-- BUTTONS -->
<button class="btn download" onclick="downloadReceipt()">Download Receipt</button>

<a id="whatsappBtn" class="btn whatsapp" target="_blank">
Send Proof via WhatsApp
</a>

<a href="index.html" class="btn primary">Continue Shopping</a>

</div>

<script>
const data = JSON.parse(localStorage.getItem("receipt"));

if(data){
let html = `
<div class="detail"><strong>Reference:</strong> ${data.ref}</div>
<div class="detail"><strong>Email:</strong> ${data.email}</div>
<div class="detail"><strong>Phone:</strong> ${data.phone}</div>
<hr>
`;

let message = `Hello, I have completed a payment.%0AReference: ${data.ref}%0ATotal: GHC ${data.total}%0AItems:%0A`;

data.cart.forEach(item=>{
html += `
<div class="item">
<span>${item.item}</span>
<span>GHC ${item.price}</span>
</div>
`;

message += `- ${item.item} (GHC ${item.price})%0A`;
});

html += `<hr><div class="total">Total: GHC ${data.total}</div>`;

document.getElementById("receiptDetails").innerHTML = html;

/* WhatsApp link */
document.getElementById("whatsappBtn").href =
`https://wa.me/233509329683?text=${message}`;
}

/* DOWNLOAD RECEIPT */
function downloadReceipt(){
const content = document.getElementById("receiptBox").innerText;

const blob = new Blob([content], { type: "text/plain" });
const link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "receipt.txt";
link.click();
}
</script>

</body>
</html>
