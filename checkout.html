<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Digital Hub Store</title>
<script src="store.js"></script>
</head>
<body>
<h1>Checkout</h1>

<p>Your Order ID: <span id="orderID"></span></p>

<p>Send payment via MoMo to <strong>054XXXXXXX</strong></p>
<p>Total Amount: GHC <span id="amount"></span></p>
<p>Use your Order ID as the payment reference.</p>

<a id="whatsappBtn" href="#" 
   style="padding:20px 40px; background-color:#25D366; color:white; text-decoration:none; font-size:18px; border-radius:10px;">
   Payment Done → WhatsApp
</a>

<script>
  // Display Order ID
  const orderID = getOrderID();
  document.getElementById('orderID').innerText = orderID;

  // Calculate total from cart
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const total = cart.reduce((acc, item) => acc + item.price, 0);
  document.getElementById('amount').innerText = total;

  // Set WhatsApp button link
  const productNames = cart.map(item => item.item).join(", ");
  const whatsappBtn = document.getElementById('whatsappBtn');
  whatsappBtn.href = getWhatsAppLink('233509329683', productNames);
</script>
</body>
</html>
