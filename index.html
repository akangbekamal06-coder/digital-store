<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Hub Store</title>
<style>
body{font-family:Arial;margin:0;padding:0;background:#f5f5f5;}
.container{max-width:500px;margin:auto;padding:20px;}
h2{text-align:center;margin-bottom:20px;}
.product{background:#fff;padding:20px;border-radius:12px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.2);margin-bottom:20px;}
button{padding:12px 20px;margin:10px 5px;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
.buy-btn{background:#ff4b4b;color:white;}
.cart-btn{background:#00aaff;color:white;}
.whatsapp-float{
position:fixed;bottom:20px;right:20px;background:#25D366;color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.3);z-index:1000;
}
</style>
</head>
<body>

<div class="container">
<h2>Digital Hub Store</h2>

<div class="product">
  <h3>1GB MTN DATA</h3>
  <p>Price: GHC 10</p>
  <button class="cart-btn" onclick="addToCart('1GB MTN DATA', 10)">Add to Cart</button>
  <button class="buy-btn" onclick="buyNow('1GB MTN DATA', 10)">Buy Now</button>
</div>

<div class="product">
  <h3>2GB MTN DATA</h3>
  <p>Price: GHC 20</p>
  <button class="cart-btn" onclick="addToCart('2GB MTN DATA', 20)">Add to Cart</button>
  <button class="buy-btn" onclick="buyNow('2GB MTN DATA', 20)">Buy Now</button>
</div>
</div>

<a href="https://wa.me/233509329683" class="whatsapp-float" target="_blank">💬</a>

<script>
function addToCart(item, price){
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.push({item, price});
  localStorage.setItem('cart', JSON.stringify(cart));
  alert(item + " added to cart!");
  window.location.href='checkout.html';
}

function buyNow(item, price){
  const cart = [{item, price}]; // Single item for Buy Now
  localStorage.setItem('cart', JSON.stringify(cart));
  window.location.href='checkout.html';
}
</script>
</body>
</html>
