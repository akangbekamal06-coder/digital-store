<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Hub Store</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

header {
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

  .products {
    display: grid;
    grid-template-columns: 1fr;
    gap: 25px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.card img {
    width: 160px;
    margin-bottom: 15px;
}

.card h3 {
    font-size: 22px;
    margin: 10px 0;
}

.card p {
    font-size: 16px;
    color: #555;
}

 .price {
    font-size: 20px;
    color: #16a34a;
    font-weight: bold;
    margin: 10px 0;
}

.btn {
    display: block;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    color: white;
    cursor: pointer;
}

.buy {
    background: #2563eb;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #666;
}

  .whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 18px;
    border-radius: 50px;
    font-size: 16px;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Modal styles */
.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    margin: 10% auto;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    text-align: center;
}

  .modal-content input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.modal-content button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>

<header>
Digital Hub Store
</header>
Digital Hub Store
</header>

<div class="container">
    <div class="products">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/NordVPN_logo.svg">
         <h3>NordVPN Account</h3>
            <p>Premium secure VPN account</p>
            <div class="price">GH₵20</div>
            <button class="btn buy" onclick="openModal(20, 'NordVPN Account')">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/Netflix_icon.svg">
            <h3>Netflix Premium</h3>
            <p>Premium Netflix streaming</p>
            <div class="price">GH₵15</div>
            <button class="btn buy" onclick="openModal(15, 'Netflix Premium')">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg">
            <h3>Spotify Premium</h3>
            <p>Unlimited music streaming</p>
            <div class="price">GH₵10</div>
            <button class="btn buy" onclick="openModal(10, 'Spotify Premium')">Buy Now</button>
        </div>

    </div>
</div>

<footer>
© 2026 Digital Hub Store
</footer>

  <a class="whatsapp-float" href="https://wa.me/233509329683">Chat</a>

<!-- Modal for customer details -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3>Enter Your Details</h3>
        <input type="text" id="customerName" placeholder="Full Name" required>
        <input type="email" id="customerEmail" placeholder="Email" required>
        <input type="tel" id="customerPhone" placeholder="Phone Number" required>
        <button onclick="payWithPaystack()">Pay Now</button>
        <button style="background:#888;margin-top:5px;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
let selectedAmount = 0;
let selectedProduct = "";

// Open modal with selected product info
function openModal(amount, product) {
    selectedAmount = amount;
    selectedProduct = product;
    document.getElementById("paymentModal").style.display = "block";
}

// Close modal
function closeModal() {

  document.getElementById("paymentModal").style.display = "none";
}

// Paystack payment
function payWithPaystack() {
    const name = document.getElementById("customerName").value;
    const email = document.getElementById("customerEmail").value;
    const phone = document.getElementById("customerPhone").value;

    if(!name || !email || !phone){
        alert("Please fill in all details");
        return;
    }

    var handler = PaystackPop.setup({
        key: 'pk_live_76e7df83f71c725b7e10d514b3c935324a97761e', // Replace with your key
        email: email,
        amount: selectedAmount * 100, // Paystack uses minor units
        currency: "GHS",
        metadata: {
            custom_fields: [
                { display_name: "Full Name", variable_name: "full_name", value: name },
{ display_name: "Phone Number", variable_name: "phone_number", value: phone },
                { display_name: "Product", variable_name: "product_name", value: selectedProduct }
            ]
        },
        callback: function(response){
            alert('Payment successful! Reference: ' + response.reference);
            closeModal();
        },
        onClose: function(){
            alert('Transaction cancelled');
        }
    });

    handler.openIframe();
}
</script>

</body>
</html>
