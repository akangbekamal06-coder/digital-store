<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Digital Hub Store</title>
<link rel="stylesheet" href="style.css">
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<header>Your Cart</header>

<div class="container">
  <div id="cart-items"></div>
  <div class="cart-total">Total: GH₵<span id="cart-total">0</span></div>
  <button class="btn" onclick="checkout()">Checkout</button>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal">
  <div class="modal-content">
    <h3>Enter Your Details</h3>
    <input type="text" id="customerName" placeholder="Full Name" required>
    <input type="email" id="customerEmail" placeholder="Email" required>
    <input type="tel" id="customerPhone" placeholder="Phone Number" required>
    <button class="btn" onclick="payCart()">Pay Now</button>
    <button class="btn cancel" onclick="closePaymentModal()">Cancel</button>
  </div>
</div>

<a class="whatsapp-float" href="https://wa.me/233509329683" target="_blank">Chat</a>

<script src="cart.js"></script>
</body>
</html>
